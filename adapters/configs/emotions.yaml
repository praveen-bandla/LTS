# Adapter config for the Emotions dataset (6-class sentiment classification).
# Maps text → one of: sadness, anger, fear, joy, love, surprise.
# Paths are resolved relative to this YAML file.

run_name: emotions
artifact_root: artifacts

data:
  pool_csv: ../../data_use_cases/emotions_pool.csv
  validation_csv: ../../data_use_cases/emotions_validation.csv

columns:
  id: id
  input_text: text
  target: label
  clean_text: clean_text
  cluster: label_cluster
  predicted: predicted_label
  answer: answer
  prompt: prompt

prompt:
  template_path: ../../prompts/emotions/gpt_prompt.txt
  label_map:
    sadness: 0
    anger: 1
    fear: 2
    joy: 3
    love: 4
    surprise: 5
  default_value: 0

trainer:
  model_name: bert-base-uncased
  num_labels: 6

training:
  balance: false
